<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mad King Season 3 Calculator</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin: 0;
    background: linear-gradient(#b8d6f2, #7aa7d6);
}

.wrap{
    max-width: 820px;
    margin: 20px 10px;
    background: white;
    padding: 15px;
    border-radius: 14px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    border: 4px solid #ff8c00;
    position: relative;
    overflow: hidden;
}

/* watermark */
.wrap::before{
    content: "TheMadKing   TheMadKing   TheMadKing";
    position: absolute;
    font-size: 90px;
    opacity: 0.05;
    transform: rotate(-25deg);
    top: 100px;
    left: -50px;
    pointer-events: none;
}

.title{
    width: 100%;
    max-height: 70px;
    object-fit: contain;
    display: block;
    margin-bottom: 10px;
}

.lastwar{
    position: absolute;
    top: 10px;
    right: 10px;
    height: 50px;
}

.king{
    position: absolute;
    bottom: -10px;
    right: -5px;
    height: 140px;
    opacity: 0.9;
    pointer-events: none;
}

.grid{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
    gap: 8px;
}

label{
    font-weight: bold;
    font-size: 13px;
    display: block;
    margin-top: 12px;
}

select,input{
    width: 100%;
    padding: 10px;
    margin-top: 4px;
    border-radius: 8px;
    border: 2px solid #8ecaff;
    box-sizing: border-box;
    font-size: 16px;
}

.results{
    margin-top: 20px;
    border-top: 2px solid #eee;
    padding-top: 12px;
}

.row{
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    flex-wrap: wrap;
}

.big{
    font-size: 22px;
    font-weight: bold;
    color: #ff6a00;
}

@media (min-width: 840px){
    .wrap{
        margin: 40px auto;
        padding: 20px;
    }

    .lastwar{
        top: 20px;
        right: 20px;
        height: 70px;
    }

    .king{
        bottom: -20px;
        right: -10px;
        height: 220px;
    }
}

@media (max-width: 600px){
    h2{
        font-size: 18px;
    }

    .king{
        height: 110px;
        opacity: 0.6;
    }

    .big{
        font-size: 18px;
    }

    .wrap::before{
        font-size: 60px;
        top: 140px;
        left: -40px;
    }
}
</style>
</head>

<body>

<div class="wrap">

    <img src="https://alextesla17.github.io/TheMadKing.png" class="title" alt="The Mad King">
    <img src="https://alextesla17.github.io/LastWar.png" class="lastwar" alt="Last War Logo">
    <img src="https://alextesla17.github.io/MadKingCharacter.png" class="king" alt="Mad King Character">

    <h2>Blessing Fountain Levels</h2>

    <div class="grid">
        <select id="f1"></select>
        <select id="f2"></select>
        <select id="f3"></select>
        <select id="f4"></select>
        <select id="f5"></select>
    </div>

    <h2>Curse Lab</h2>

    <label for="curseLevel">Level</label>
    <select id="curseLevel"></select>

    <label for="currentWater">Current Sacred Water</label>
    <input id="currentWater" type="number" value="0">

    <div class="results">
        <div class="row"><span>Total hourly production</span><b id="totalOutput">0</b></div>
        <div class="row"><span>Requirement</span><b id="requirement">-</b></div>
        <div class="row"><span>Still needed</span><b id="needed">-</b></div>
        <div class="row"><span>Time</span><span class="big" id="timeText">-</span></div>
    </div>

</div>

<script>
const fountainOutput = {
    0:0,1:720,2:1440,3:2160,4:2880,5:3600,
    6:4320,7:5040,8:5760,9:6480,10:7200,11:7920,
    12:8640,13:9360,14:10080,15:10800,16:11520,17:12240,
    18:12960,19:13680,20:14400,21:15120,22:15840,23:16560,
    24:17280,25:18000,26:18720,27:19440,28:20160,29:20880,30:21600
};

const curseRequirement = {
    0:null,1:700,2:11200,3:22400,4:33600,5:44800,
    6:89600,7:125400,8:163100,9:195700,10:281800,
    11:338100,12:405800,13:486900,14:584300,
    15:700200,16:771300,17:848400,18:933300,
    19:19000000,20:20000000,21:21000000,22:22000000,
    23:23000000,24:24000000,25:25000000,26:26000000,
    27:27000000,28:28000000,29:29000000,30:30000000
};

const fountainIds = ["f1","f2","f3","f4","f5"];

function populate(select, min, max, def){
    for(let i = min; i <= max; i++){
        const o = document.createElement("option");
        o.value = i;
        o.text = i;
        if(i === def) o.selected = true;
        select.appendChild(o);
    }
}

fountainIds.forEach(id => {
    populate(document.getElementById(id), 0, 30, 0);
    document.getElementById(id).addEventListener("change", calc);
});

populate(document.getElementById("curseLevel"), 0, 30, 0);
document.getElementById("curseLevel").addEventListener("change", calc);
document.getElementById("currentWater").addEventListener("input", calc);

function formatTime(mins){
    if(mins <= 0) return "Ready";
    const d = Math.floor(mins / 1440);
    const h = Math.floor((mins % 1440) / 60);
    const m = mins % 60;
    return `${d > 0 ? d + "d " : ""}${h}h ${m}m`;
}

function calc(){
    let total = 0;

    fountainIds.forEach(id => {
        const lvl = parseInt(document.getElementById(id).value) || 0;
        total += fountainOutput[lvl];
    });

    const curse = parseInt(document.getElementById("curseLevel").value) || 0;
    const req = curseRequirement[curse];
    const current = parseInt(document.getElementById("currentWater").value) || 0;
    const need = Math.max(0, (req || 0) - current);

    let time = "-";

    if(req == null){
        time = "Invalid";
    }else if(need === 0){
        time = "Ready to upgrade";
    }else if(total <= 0){
        time = "No production";
    }else{
        const mins = Math.ceil((need / total) * 60);
        time = formatTime(mins);
    }

    document.getElementById("totalOutput").innerText = total;
    document.getElementById("requirement").innerText = req ?? "-";
    document.getElementById("needed").innerText = req == null ? "-" : need;
    document.getElementById("timeText").innerText = time;
}

calc();
</script>

</body>
</html>
